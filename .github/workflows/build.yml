#
# Build Android SDK tools for Linux ARM64 and create GitHub Release.
#
# Triggers:
#   - Push a tag like v35.0.2 to create a release
#   - Manual dispatch for testing (no release created unless tag is set)
#
# The workflow runs on GitHub's native ARM64 runner (ubuntu-24.04-arm),
# clones ~38 AOSP repos, builds all tools, and uploads two tarballs:
#   - android-sdk-linux-arm64-build-tools-<version>.tar.gz
#   - android-sdk-linux-arm64-platform-tools-<version>.tar.gz
#
name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      aosp_tag:
        description: "AOSP tag to clone (e.g. platform-tools-35.0.2)"
        required: false
        default: "platform-tools-35.0.2"
      version:
        description: "Version string (e.g. 35.0.2)"
        required: false
        default: "35.0.2"
      create_release:
        description: "Create a GitHub release?"
        required: false
        type: boolean
        default: false

env:
  BUILD_TOOLS_BINS: "aapt aapt2 aidl zipalign dexdump split-select"
  PLATFORM_TOOLS_BINS: "adb fastboot sqlite3 etc1tool hprof-conv mke2fs e2fsdroid make_f2fs make_f2fs_casefold sload_f2fs"

jobs:
  build:
    name: Build (Linux ARM64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Parse version from tag or input ──
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          else
            VERSION="${{ inputs.version }}"
          fi

          # Look up AOSP tag from versions.json
          AOSP_TAG=$(python3 -c "import json; d=json.load(open('versions.json')); t=d.get('build-tools',{}).get('$VERSION',{}).get('aosp_tag','') or d.get('platform-tools',{}).get('$VERSION',{}).get('aosp_tag',''); print(t)" 2>/dev/null || echo "")

          # Manual override (for manual dispatch)
          if [[ -n "${{ inputs.aosp_tag }}" ]]; then
            AOSP_TAG="${{ inputs.aosp_tag }}"
          fi

          # Fallback if not found
          if [[ -z "$AOSP_TAG" ]]; then
            AOSP_TAG="platform-tools-${VERSION}"
            echo "::warning::No AOSP tag in versions.json for ${VERSION}, using fallback: ${AOSP_TAG}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "aosp_tag=${AOSP_TAG}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "::notice::Building version ${VERSION} from AOSP tag ${AOSP_TAG}"

      # ── Install build dependencies ──
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc g++ cmake ninja-build git python3 golang bison flex \
            zlib1g-dev libssl-dev libusb-1.0-0-dev libpcre2-dev \
            libexpat1-dev libpng-dev file

      # ── Clone AOSP sources ──
      - name: Clone AOSP sources
        run: |
          python3 get_source.py \
            --tags "${{ steps.version.outputs.aosp_tag }}" \
            --component build-tools \
            --version "${{ steps.version.outputs.version }}"

      # ── Build host protoc ──
      - name: Build protoc
        run: |
          mkdir -p src/protobuf/build
          # Copy protobuf config.h (version-specific -> base fallback)
          VERSION="${{ steps.version.outputs.version }}"
          if [[ -f "patches/build-tools/${VERSION}/misc/protobuf_config.h" ]]; then
            cp "patches/build-tools/${VERSION}/misc/protobuf_config.h" src/protobuf/build/config.h
          else
            cp patches/base/misc/protobuf_config.h src/protobuf/build/config.h
          fi
          cmake -GNinja \
            -B src/protobuf/build \
            -S src/protobuf \
            -Dprotobuf_BUILD_TESTS=OFF
          ninja -C src/protobuf/build -j$(nproc) protoc
          echo "PROTOC=$(pwd)/src/protobuf/build/protoc" >> "$GITHUB_ENV"

      # ── Build all SDK tools ──
      - name: Build SDK tools
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          python3 build.py --protoc="$PROTOC" --build="build/${VERSION}"
          echo "BUILD_BIN=$(pwd)/build/${VERSION}/bin" >> "$GITHUB_ENV"

      # ── Verify binaries ──
      - name: Verify binaries
        run: |
          echo "=== Checking binaries ==="
          for bin in $BUILD_TOOLS_BINS $PLATFORM_TOOLS_BINS veridex; do
            path="${BUILD_BIN}/${bin}"
            if [[ -x "$path" ]]; then
              ftype=$(file -b "$path")
              if [[ "$ftype" != *"aarch64"* && "$ftype" != *"ARM aarch64"* ]]; then
                echo "FAIL: ${bin} is not ARM64: ${ftype}"
                exit 1
              fi
              size=$(stat -c%s "$path")
              echo "OK: ${bin} ($(( size / 1024 )) KB) — ${ftype}"
            else
              echo "MISSING: ${bin}"
              exit 1
            fi
          done

      # ── Package tarballs ──
      - name: Package release tarballs
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="$(mktemp -d)"

          # build-tools tarball
          BT_DIR="${STAGING}/build-tools"
          mkdir -p "$BT_DIR"
          for bin in $BUILD_TOOLS_BINS; do
            cp "${BUILD_BIN}/${bin}" "$BT_DIR/"
            chmod +x "$BT_DIR/${bin}"
          done
          BT_TAR="android-sdk-linux-arm64-build-tools-${VERSION}.tar.gz"
          tar -czf "${STAGING}/${BT_TAR}" -C "$STAGING" build-tools
          echo "bt_tarball=${STAGING}/${BT_TAR}" >> "$GITHUB_OUTPUT"
          echo "bt_tarball_name=${BT_TAR}" >> "$GITHUB_OUTPUT"

          # platform-tools tarball
          PT_DIR="${STAGING}/platform-tools"
          mkdir -p "$PT_DIR"
          for bin in $PLATFORM_TOOLS_BINS; do
            cp "${BUILD_BIN}/${bin}" "$PT_DIR/"
            chmod +x "$PT_DIR/${bin}"
          done
          PT_TAR="android-sdk-linux-arm64-platform-tools-${VERSION}.tar.gz"
          tar -czf "${STAGING}/${PT_TAR}" -C "$STAGING" platform-tools
          echo "pt_tarball=${STAGING}/${PT_TAR}" >> "$GITHUB_OUTPUT"
          echo "pt_tarball_name=${PT_TAR}" >> "$GITHUB_OUTPUT"

          # Combined tarball (for backward compat with setup.sh download)
          ALL_DIR="${STAGING}/bin"
          mkdir -p "$ALL_DIR"
          for bin in $BUILD_TOOLS_BINS $PLATFORM_TOOLS_BINS; do
            cp "${BUILD_BIN}/${bin}" "$ALL_DIR/"
            chmod +x "$ALL_DIR/${bin}"
          done
          # Include veridex too
          if [[ -x "${BUILD_BIN}/veridex" ]]; then
            cp "${BUILD_BIN}/veridex" "$ALL_DIR/"
            chmod +x "$ALL_DIR/veridex"
          fi
          ALL_TAR="android-sdk-linux-arm64-v${VERSION}.tar.gz"
          tar -czf "${STAGING}/${ALL_TAR}" -C "$STAGING" bin
          echo "all_tarball=${STAGING}/${ALL_TAR}" >> "$GITHUB_OUTPUT"
          echo "all_tarball_name=${ALL_TAR}" >> "$GITHUB_OUTPUT"

          echo "::notice::Tarballs created: ${BT_TAR}, ${PT_TAR}, ${ALL_TAR}"
          ls -lh "${STAGING}"/*.tar.gz

      # ── Upload artifacts (always, for testing) ──
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-sdk-linux-arm64-${{ steps.version.outputs.version }}
          path: |
            ${{ steps.package.outputs.bt_tarball }}
            ${{ steps.package.outputs.pt_tarball }}
            ${{ steps.package.outputs.all_tarball }}
          retention-days: 30

      # ── Create GitHub Release (on tag push or manual request) ──
      - name: Create GitHub Release
        if: github.ref_type == 'tag' || inputs.create_release == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          NOTES="## Android SDK Tools for Linux ARM64 — ${VERSION}

          Native \`aarch64\` binaries built from AOSP source (\`${{ steps.version.outputs.aosp_tag }}\`).

          ### Build-tools
          \`\`\`
          aapt, aapt2, aidl, zipalign, dexdump, split-select
          \`\`\`

          ### Platform-tools
          \`\`\`
          adb, fastboot, sqlite3, etc1tool, hprof-conv, mke2fs, e2fsdroid,
          make_f2fs, make_f2fs_casefold, sload_f2fs
          \`\`\`

          ### Quick install
          \`\`\`bash
          # Using setup.sh
          curl -fsSL https://raw.githubusercontent.com/hamza72x/android-sdk-linux-arm64/main/setup.sh -o setup.sh
          chmod +x setup.sh
          ./setup.sh install-build-tools ${VERSION}
          ./setup.sh install-platform-tools ${VERSION}
          \`\`\`

          ### Manual install
          \`\`\`bash
          # Download and extract
          tar xzf android-sdk-linux-arm64-build-tools-${VERSION}.tar.gz -C \$ANDROID_SDK/build-tools/${VERSION}/
          tar xzf android-sdk-linux-arm64-platform-tools-${VERSION}.tar.gz -C \$ANDROID_SDK/
          \`\`\`

          Built on: \`ubuntu-24.04-arm\` (GitHub Actions)
          "

          gh release create "$TAG" \
            --title "v${VERSION}" \
            --notes "$NOTES" \
            "${{ steps.package.outputs.bt_tarball }}#${{ steps.package.outputs.bt_tarball_name }}" \
            "${{ steps.package.outputs.pt_tarball }}#${{ steps.package.outputs.pt_tarball_name }}" \
            "${{ steps.package.outputs.all_tarball }}#${{ steps.package.outputs.all_tarball_name }}"
